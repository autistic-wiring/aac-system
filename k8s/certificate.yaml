apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aac-board-tls
  namespace: asd
spec:
  secretName: aac-board-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - aac.nexvision.cc
  usages:
    - digital signature
    - key encipherment
