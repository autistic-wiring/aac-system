server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # serve pre-compressed assets if available
    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # no cache for service worker and manifest
    location ~* (sw\.js|manifest\.webmanifest|registerSW\.js)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
