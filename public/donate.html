<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support AAC Board – Donate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    }

    .emoji { font-size: 56px; margin-bottom: 16px; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa, #6C63FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .amount-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .amount-btn {
      background: rgba(108, 99, 255, 0.15);
      border: 2px solid rgba(108, 99, 255, 0.35);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .amount-btn:hover,
    .amount-btn.selected {
      background: rgba(108, 99, 255, 0.45);
      border-color: #6C63FF;
      transform: translateY(-2px);
    }

    .custom-input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      padding: 12px 16px;
      margin-bottom: 24px;
      outline: none;
      transition: border-color 0.2s;
    }

    .custom-input:focus {
      border-color: #6C63FF;
    }

    .custom-input::placeholder { color: rgba(255,255,255,0.35); }

    #paypal-button-container { min-height: 50px; }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .back-link:hover { color: rgba(255,255,255,0.8); }

    #status-msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    #status-msg.success {
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.4);
      color: #6ee7b7;
      display: block;
    }

    #status-msg.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      display: block;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="emoji">💜</div>
  <h1>Support AAC Board</h1>
  <p class="subtitle">
    AAC Board is a free, open-source communication tool for autistic individuals.
    Your donation helps keep it free and actively developed.
  </p>

  <div class="amount-grid">
    <button class="amount-btn" onclick="setAmount(5)">$5</button>
    <button class="amount-btn selected" onclick="setAmount(10)">$10</button>
    <button class="amount-btn" onclick="setAmount(25)">$25</button>
    <button class="amount-btn" onclick="setAmount(50)">$50</button>
    <button class="amount-btn" onclick="setAmount(100)">$100</button>
    <button class="amount-btn" onclick="setAmount(null)">Custom</button>
  </div>

  <input
    type="number"
    id="custom-amount"
    class="custom-input"
    placeholder="Enter custom amount (USD)"
    min="1"
    step="1"
    style="display:none"
  />

  <div id="paypal-button-container"></div>
  <div id="status-msg"></div>

  <a href="/" class="back-link">← Back to AAC Board</a>
</div>

<script>
  let selectedAmount = 10;

  function setAmount(val) {
    const customInput = document.getElementById('custom-amount');
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    event.target.classList.add('selected');

    if (val === null) {
      customInput.style.display = 'block';
      customInput.focus();
      selectedAmount = null;
    } else {
      customInput.style.display = 'none';
      selectedAmount = val;
    }
  }

  function getAmount() {
    if (selectedAmount !== null) return selectedAmount.toFixed(2);
    const custom = parseFloat(document.getElementById('custom-amount').value);
    return (custom > 0 ? custom : 5).toFixed(2);
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status-msg');
    el.className = type;
    el.textContent = msg;
  }
</script>

<!-- PayPal JS SDK -->
<script
  src="https://www.paypal.com/sdk/js?client-id=AYWxcB5n6Hfq5a8bsK4JaIbWE2pTJ0klFA6Bgkr5hBxsK8NWyKEqrkU2DqU00OxP88zHFBY8PVtSisBB&currency=USD&intent=capture"
  onload="initPayPal()"
></script>

<script>
  function initPayPal() {
    paypal.Buttons({
      style: {
        layout: 'vertical',
        color:  'blue',
        shape:  'pill',
        label:  'donate',
        height: 50
      },
      createOrder(data, actions) {
        const amount = getAmount();
        return actions.order.create({
          purchase_units: [{
            description: 'Donation to AAC Board – autistic-wiring/aac-system',
            amount: {
              currency_code: 'USD',
              value: amount
            }
          }],
          application_context: {
            shipping_preference: 'NO_SHIPPING'
          }
        });
      },
      onApprove(data, actions) {
        return actions.order.capture().then(details => {
          showStatus('success', `✅ Thank you, ${details.payer.name.given_name}! Your $${getAmount()} donation means the world to us. 💜`);
        });
      },
      onError(err) {
        console.error(err);
        showStatus('error', '⚠️ Something went wrong. Please try again or contact us.');
      },
      onCancel() {
        showStatus('error', 'Donation cancelled. Feel free to try again anytime.');
      }
    }).render('#paypal-button-container');
  }
</script>

</body>
</html>
